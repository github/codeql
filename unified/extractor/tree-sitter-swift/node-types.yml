supertypes:
  expression:
    - additive_expression
    - array_literal
    - as_expression
    - assignment
    - await_expression
    - bin_literal
    - bitwise_operation
    - boolean_literal
    - call_expression
    - check_expression
    - comparison_expression
    - conjunction_expression
    - constructor_expression
    - diagnostic
    - dictionary_literal
    - directive
    - disjunction_expression
    - equality_expression
    - fully_open_range
    - hex_literal
    - if_statement
    - infix_expression
    - integer_literal
    - key_path_expression
    - key_path_string_expression
    - lambda_literal
    - line_string_literal
    - macro_invocation
    - multi_line_string_literal
    - multiplicative_expression
    - navigation_expression
    - "nil"
    - nil_coalescing_expression
    - oct_literal
    - open_end_range_expression
    - open_start_range_expression
    - optional_chain_marker
    - playground_literal
    - postfix_expression
    - prefix_expression
    - range_expression
    - raw_string_literal
    - real_literal
    - referenceable_operator
    - regex_literal
    - selector_expression
    - self_expression
    - simple_identifier
    - special_literal
    - super_expression
    - switch_statement
    - ternary_expression
    - try_expression
    - tuple_expression
    - value_pack_expansion
    - value_parameter_pack
  unannotated_type:
    - array_type
    - dictionary_type
    - existential_type
    - function_type
    - metatype
    - opaque_type
    - optional_type
    - protocol_composition_type
    - suppressed_constraint
    - tuple_type
    - type_pack_expansion
    - type_parameter_pack
    - user_type

named:
  additive_expression:
    lhs: expression
    op: ["+", "-"]
    rhs: expression
  array_literal:
    element*: expression
  array_type:
    element+: [type_modifiers, unannotated_type]
    name: unannotated_type
  as_expression:
    $children: as_operator
    expr: expression
    name: unannotated_type
    type+: [type_modifiers, unannotated_type]
  as_operator:
  assignment:
    operator: ["%=", "*=", "+=", "-=", "/=", "="]
    result: expression
    target: directly_assignable_expression
  associatedtype_declaration:
    $children*: [modifiers, type_constraints]
    default_value*: [type_modifiers, unannotated_type]
    must_inherit*: [type_modifiers, unannotated_type]
    name+: [type_identifier, unannotated_type]
  attribute:
    $children+: [expression, user_type]
  availability_condition:
    $children*: [identifier, integer_literal]
  await_expression:
    $children?: expression
    expr?: expression
  bang:
  bin_literal:
  bitwise_operation:
    lhs: expression
    op: ["&", "<<", ">>", "^", "|"]
    rhs: expression
  boolean_literal:
  call_expression:
    $children+: [call_suffix, expression]
  call_suffix:
    $children+: [lambda_literal, value_arguments]
    name*: simple_identifier
  capture_list:
    $children+: capture_list_item
  capture_list_item:
    $children?: ownership_modifier
    name: [self_expression, simple_identifier]
    value?: expression
  catch_block:
    $children+: [catch_keyword, statements, where_clause]
    error?: pattern
  catch_keyword:
  check_expression:
    name: unannotated_type
    op: "is"
    target: expression
    type+: [type_modifiers, unannotated_type]
  class_body:
    $children*: [associatedtype_declaration, class_declaration, deinit_declaration, function_declaration, import_declaration, init_declaration, multiline_comment, operator_declaration, precedence_group_declaration, property_declaration, protocol_declaration, subscript_declaration, typealias_declaration]
  class_declaration:
    $children*: [attribute, inheritance_modifier, inheritance_specifier, modifiers, ownership_modifier, property_behavior_modifier, type_constraints, type_parameters]
    body: [class_body, enum_class_body]
    declaration_kind: ["actor", "class", "enum", "extension", "struct"]
    name: [type_identifier, unannotated_type]
  comment:
  comparison_expression:
    lhs: expression
    op: ["<", "<=", ">", ">="]
    rhs: expression
  computed_getter:
    $children+: [attribute, getter_specifier, statements]
  computed_modify:
    $children+: [attribute, modify_specifier, statements]
  computed_property:
    $children*: [computed_getter, computed_modify, computed_setter, statements]
  computed_setter:
    $children+: [attribute, setter_specifier, simple_identifier, statements]
  conjunction_expression:
    lhs: expression
    op: "&&"
    rhs: expression
  constructor_expression:
    $children: constructor_suffix
    constructed_type: [array_type, dictionary_type, user_type]
  constructor_suffix:
    $children+: [lambda_literal, value_arguments]
    name*: simple_identifier
  control_transfer_statement:
    $children*: [expression, throw_keyword]
    result?: expression
  custom_operator:
  default_keyword:
  deinit_declaration:
    $children?: modifiers
    body: function_body
  deprecated_operator_declaration_body:
    $children*: [bin_literal, boolean_literal, hex_literal, integer_literal, line_string_literal, multi_line_string_literal, oct_literal, raw_string_literal, real_literal, regex_literal, simple_identifier]
  diagnostic:
  dictionary_literal:
    key*: expression
    value*: expression
  dictionary_type:
    key+: [type_modifiers, unannotated_type]
    name+: unannotated_type
    value+: [type_modifiers, unannotated_type]
  didset_clause:
    $children*: [modifiers, simple_identifier, statements]
  directive:
    $children*: [boolean_literal, integer_literal, simple_identifier]
  directly_assignable_expression:
    $children: expression
  disjunction_expression:
    lhs: expression
    op: "||"
    rhs: expression
  do_statement:
    $children*: [catch_block, statements]
  else:
  enum_class_body:
    $children*: [associatedtype_declaration, class_declaration, deinit_declaration, enum_entry, function_declaration, import_declaration, init_declaration, operator_declaration, precedence_group_declaration, property_declaration, protocol_declaration, subscript_declaration, typealias_declaration]
  enum_entry:
    $children?: modifiers
    data_contents*: enum_type_parameters
    name+: simple_identifier
    raw_value*: expression
  enum_type_parameters:
    $children*: [expression, type_modifiers, wildcard_pattern]
    name*: unannotated_type
  equality_constraint:
    $children*: attribute
    constrained_type+: [".", identifier, simple_identifier, unannotated_type]
    must_equal+: [type_modifiers, unannotated_type]
    name: unannotated_type
  equality_expression:
    lhs: expression
    op: ["!=", "!==", "==", "==="]
    rhs: expression
  existential_type:
    $children: unannotated_type
  external_macro_definition:
    $children: value_arguments
  for_statement:
    $children*: [statements, try_operator, type_annotation, where_clause]
    collection: expression
    item: pattern
  fully_open_range:
  function_body:
    $children?: statements
  function_declaration:
    $children*: [attribute, inheritance_modifier, modifiers, ownership_modifier, parameter, property_behavior_modifier, throws, throws_clause, type_constraints, type_parameters]
    body: function_body
    default_value*: expression
    name+: [referenceable_operator, simple_identifier, unannotated_type]
    return_type*: [implicitly_unwrapped_type, type_modifiers, unannotated_type]
  function_modifier:
  function_type:
    $children?: [throws, throws_clause]
    name: unannotated_type
    params: unannotated_type
    return_type+: [type_modifiers, unannotated_type]
  getter_specifier:
    $children*: [mutation_modifier, throws, throws_clause]
  guard_statement:
    $children+: [else, statements]
    condition+: if_condition
  hex_literal:
  identifier:
    $children+: simple_identifier
  if_condition:
    $children*: [availability_condition, expression, pattern, type_annotation, type_modifiers, user_type, value_binding_pattern, where_clause, wildcard_pattern]
    bound_identifier?: simple_identifier
    name?: unannotated_type
  if_statement:
    $children*: [else, if_statement, statements]
    condition+: if_condition
  implicitly_unwrapped_type:
    $children?: type_modifiers
    name: unannotated_type
  import_declaration:
    $children+: [identifier, modifiers]
  infix_expression:
    lhs: expression
    op: custom_operator
    rhs: expression
  inheritance_constraint:
    $children*: attribute
    constrained_type+: [".", identifier, simple_identifier, unannotated_type]
    inherits_from+: [implicitly_unwrapped_type, type_modifiers, unannotated_type]
    name?: unannotated_type
  inheritance_modifier:
  inheritance_specifier:
    inherits_from: [function_type, suppressed_constraint, user_type]
  init_declaration:
    $children*: [attribute, bang, modifiers, parameter, throws, throws_clause, type_constraints, type_parameters]
    body?: function_body
    default_value*: expression
    name: "init"
  integer_literal:
  interpolated_expression:
    $children?: type_modifiers
    name?: value_argument_label
    reference_specifier*: value_argument_label
    value?: expression
  key_path_expression:
    $children*: [array_type, bang, dictionary_type, simple_identifier, type_arguments, type_identifier, value_argument]
  key_path_string_expression:
    $children: expression
  lambda_function_type:
    $children*: [lambda_function_type_parameters, throws, throws_clause]
    name?: unannotated_type
    return_type*: [implicitly_unwrapped_type, type_modifiers, unannotated_type]
  lambda_function_type_parameters:
    $children+: lambda_parameter
  lambda_literal:
    $children*: [attribute, statements]
    captures?: capture_list
    type?: lambda_function_type
  lambda_parameter:
    $children?: [parameter_modifiers, self_expression]
    external_name?: simple_identifier
    name*: [simple_identifier, unannotated_type]
    type*: [implicitly_unwrapped_type, type_modifiers, unannotated_type]
  line_str_text:
  line_string_literal:
    interpolation*: interpolated_expression
    text*: [line_str_text, str_escaped_char]
  macro_declaration:
    $children+: [attribute, modifiers, parameter, simple_identifier, type_constraints, type_parameters, unannotated_type]
    default_value*: expression
    definition?: macro_definition
  macro_definition:
    body: [expression, external_macro_definition]
  macro_invocation:
    $children+: [call_suffix, simple_identifier, type_parameters]
  member_modifier:
  metatype:
    $children: unannotated_type
  modifiers:
    $children+: [attribute, function_modifier, inheritance_modifier, member_modifier, mutation_modifier, ownership_modifier, parameter_modifier, property_behavior_modifier, property_modifier, visibility_modifier]
  modify_specifier:
    $children?: mutation_modifier
  multi_line_str_text:
  multi_line_string_literal:
    interpolation*: interpolated_expression
    text*: ["\"", multi_line_str_text, str_escaped_char]
  multiline_comment:
  multiplicative_expression:
    lhs: expression
    op: ["%", "*", "/"]
    rhs: expression
  mutation_modifier:
  navigation_expression:
    element?: [dictionary_type, existential_type, opaque_type]
    suffix: navigation_suffix
    target+: ["(", ")", array_type, dictionary_type, existential_type, expression, opaque_type, user_type]
  navigation_suffix:
    suffix: [integer_literal, simple_identifier]
  nil_coalescing_expression:
    if_nil: expression
    value: expression
  oct_literal:
  opaque_type:
    $children: unannotated_type
  open_end_range_expression:
    start: expression
  open_start_range_expression:
    end: expression
  operator_declaration:
    $children+: [deprecated_operator_declaration_body, referenceable_operator, simple_identifier]
  optional_chain_marker:
    $children: expression
  optional_type:
    wrapped: [array_type, dictionary_type, tuple_type, user_type]
  ownership_modifier:
  parameter:
    $children?: parameter_modifiers
    external_name?: simple_identifier
    name+: [simple_identifier, unannotated_type]
    type+: [implicitly_unwrapped_type, type_modifiers, unannotated_type]
  parameter_modifier:
  parameter_modifiers:
    $children+: parameter_modifier
  pattern:
    $children*: [expression, pattern, type_modifiers, user_type, value_binding_pattern, wildcard_pattern]
    bound_identifier?: simple_identifier
    name?: unannotated_type
  playground_literal:
    $children+: expression
  postfix_expression:
    operation: ["++", "--", bang]
    target: expression
  precedence_group_attribute:
    $children+: [boolean_literal, simple_identifier]
  precedence_group_attributes:
    $children+: precedence_group_attribute
  precedence_group_declaration:
    $children+: [precedence_group_attributes, simple_identifier]
  prefix_expression:
    operation: ["&", "+", "++", "-", "--", ".", bang, custom_operator, "~"]
    target: expression
  property_behavior_modifier:
  property_declaration:
    $children*: [attribute, inheritance_modifier, modifiers, ownership_modifier, property_behavior_modifier, type_annotation, type_constraints, value_binding_pattern, willset_didset_block]
    computed_value*: computed_property
    name+: pattern
    value*: expression
  property_modifier:
  protocol_body:
    $children*: [associatedtype_declaration, deinit_declaration, init_declaration, protocol_function_declaration, protocol_property_declaration, subscript_declaration, typealias_declaration]
    body*: protocol_function_declaration
  protocol_composition_type:
    $children+: unannotated_type
  protocol_declaration:
    $children*: [attribute, inheritance_specifier, modifiers, type_constraints, type_parameters]
    body: protocol_body
    declaration_kind: "protocol"
    name: type_identifier
  protocol_function_declaration:
    $children*: [attribute, modifiers, parameter, statements, throws, throws_clause, type_constraints, type_parameters]
    default_value*: expression
    name*: [referenceable_operator, simple_identifier, unannotated_type]
    return_type*: [implicitly_unwrapped_type, type_modifiers, unannotated_type]
  protocol_property_declaration:
    $children+: [modifiers, protocol_property_requirements, type_annotation, type_constraints]
    name: pattern
  protocol_property_requirements:
    $children*: [getter_specifier, setter_specifier]
  range_expression:
    end: expression
    op: ["...", "..<"]
    start: expression
  raw_str_continuing_indicator:
  raw_str_end_part:
  raw_str_interpolation:
    $children: raw_str_interpolation_start
    interpolation+: interpolated_expression
  raw_str_interpolation_start:
  raw_str_part:
  raw_string_literal:
    $children*: raw_str_continuing_indicator
    interpolation*: raw_str_interpolation
    text+: [raw_str_end_part, raw_str_part]
  real_literal:
  referenceable_operator:
    $children?: [bang, custom_operator]
  regex_literal:
  repeat_while_statement:
    $children?: statements
    condition+: if_condition
  selector_expression:
    $children: expression
  self_expression:
  setter_specifier:
    $children?: mutation_modifier
  shebang_line:
  simple_identifier:
  source_file:
    $children*: [associatedtype_declaration, class_declaration, do_statement, expression, for_statement, function_declaration, guard_statement, import_declaration, init_declaration, macro_declaration, operator_declaration, precedence_group_declaration, property_declaration, protocol_declaration, repeat_while_statement, shebang_line, statement_label, throw_keyword, typealias_declaration, while_statement]
  special_literal:
  statement_label:
  statements:
    $children+: [class_declaration, control_transfer_statement, do_statement, expression, for_statement, function_declaration, guard_statement, property_declaration, repeat_while_statement, statement_label, typealias_declaration, while_statement]
  str_escaped_char:
  subscript_declaration:
    $children+: [attribute, computed_property, modifiers, parameter, type_constraints, type_parameters]
    default_value*: expression
    name?: unannotated_type
    return_type*: [implicitly_unwrapped_type, type_modifiers, unannotated_type]
  super_expression:
  suppressed_constraint:
    suppressed: type_identifier
  switch_entry:
    $children+: [default_keyword, expression, modifiers, statements, switch_pattern, where_keyword]
  switch_pattern:
    $children: pattern
  switch_statement:
    $children*: switch_entry
    expr: expression
  ternary_expression:
    condition: expression
    if_false: expression
    if_true: expression
  throw_keyword:
  throws:
  throws_clause:
    type: unannotated_type
  try_expression:
    $children: try_operator
    expr: expression
  try_operator:
  tuple_expression:
    name*: simple_identifier
    value+: expression
  tuple_type:
    $children?: tuple_type_item
    element*: tuple_type_item
  tuple_type_item:
    $children*: [parameter_modifiers, wildcard_pattern]
    element?: [dictionary_type, existential_type, opaque_type]
    name*: [simple_identifier, unannotated_type]
    type*: [type_modifiers, unannotated_type]
  type_annotation:
    name?: unannotated_type
    type+: [implicitly_unwrapped_type, type_modifiers, unannotated_type]
  type_arguments:
    $children*: type_modifiers
    name+: unannotated_type
  type_constraint:
    $children: [equality_constraint, inheritance_constraint]
  type_constraints:
    $children+: [type_constraint, where_keyword]
  type_identifier:
  type_modifiers:
    $children+: attribute
  type_pack_expansion:
    $children: unannotated_type
  type_parameter:
    $children+: [type_identifier, type_modifiers, type_parameter_modifiers, type_parameter_pack]
    name?: unannotated_type
  type_parameter_modifiers:
    $children+: attribute
  type_parameter_pack:
    $children: unannotated_type
  type_parameters:
    $children+: [type_constraints, type_parameter]
  typealias_declaration:
    $children*: [attribute, inheritance_modifier, modifiers, ownership_modifier, property_behavior_modifier, type_parameters]
    name+: [type_identifier, unannotated_type]
    value+: [type_modifiers, unannotated_type]
  user_type:
    $children+: [type_arguments, type_identifier]
  value_argument:
    $children?: type_modifiers
    name?: value_argument_label
    reference_specifier*: value_argument_label
    value?: expression
  value_argument_label:
    $children: simple_identifier
  value_arguments:
    $children*: value_argument
  value_binding_pattern:
    mutability: ["let", "var"]
  value_pack_expansion:
    $children: expression
  value_parameter_pack:
    $children: expression
  visibility_modifier:
  where_clause:
    $children+: [expression, where_keyword]
  where_keyword:
  while_statement:
    $children?: statements
    condition+: if_condition
  wildcard_pattern:
  willset_clause:
    $children*: [modifiers, simple_identifier, statements]
  willset_didset_block:
    $children+: [didset_clause, willset_clause]

