supertypes:
  expression:
    - additive_expression
    - array_literal
    - as_expression
    - assignment
    - await_expression
    - bin_literal
    - bitwise_operation
    - boolean_literal
    - call_expression
    - check_expression
    - comparison_expression
    - conjunction_expression
    - constructor_expression
    - diagnostic
    - dictionary_literal
    - directive
    - disjunction_expression
    - equality_expression
    - fully_open_range
    - hex_literal
    - if_statement
    - infix_expression
    - integer_literal
    - key_path_expression
    - key_path_string_expression
    - lambda_literal
    - line_string_literal
    - macro_invocation
    - multi_line_string_literal
    - multiplicative_expression
    - navigation_expression
    - "nil"
    - nil_coalescing_expression
    - oct_literal
    - open_end_range_expression
    - open_start_range_expression
    - optional_chain_marker
    - playground_literal
    - postfix_expression
    - prefix_expression
    - range_expression
    - raw_string_literal
    - real_literal
    - referenceable_operator
    - regex_literal
    - selector_expression
    - self_expression
    - simple_identifier
    - special_literal
    - super_expression
    - switch_statement
    - ternary_expression
    - try_expression
    - tuple_expression
    - value_pack_expansion
    - value_parameter_pack
  global_declaration:
    - associatedtype_declaration
    - class_declaration
    - function_declaration
    - import_declaration
    - init_declaration
    - macro_declaration
    - operator_declaration
    - precedence_group_declaration
    - property_declaration
    - protocol_declaration
    - typealias_declaration
  local_declaration:
    - class_declaration
    - function_declaration
    - property_declaration
    - typealias_declaration
  protocol_member_declaration:
    - associatedtype_declaration
    - deinit_declaration
    - init_declaration
    - protocol_function_declaration
    - protocol_property_declaration
    - subscript_declaration
    - typealias_declaration
  type_level_declaration:
    - associatedtype_declaration
    - class_declaration
    - deinit_declaration
    - function_declaration
    - import_declaration
    - init_declaration
    - operator_declaration
    - precedence_group_declaration
    - property_declaration
    - protocol_declaration
    - subscript_declaration
    - typealias_declaration
  unannotated_type:
    - array_type
    - dictionary_type
    - existential_type
    - function_type
    - metatype
    - opaque_type
    - optional_type
    - protocol_composition_type
    - suppressed_constraint
    - tuple_type
    - type_pack_expansion
    - type_parameter_pack
    - user_type

named:
  additive_expression:
    lhs: expression
    op: ["+", "-"]
    rhs: expression
  array_literal:
    element*: expression
  array_type:
    element: type
  as_expression:
    expr: expression
    operator: as_operator
    type: type
  as_operator:
  assignment:
    operator: ["%=", "*=", "+=", "-=", "/=", "="]
    result: expression
    target: directly_assignable_expression
  associatedtype_declaration:
    default_value?: type
    modifiers?: modifiers
    must_inherit?: type
    name: type_identifier
    type_constraints?: type_constraints
  async_keyword:
  attribute:
    argument*: expression
    argument_name*: simple_identifier
    name: user_type
    param_ref*: simple_identifier
    platform*: simple_identifier
    version*: integer_literal
  availability_condition:
    platform*: identifier
    version*: integer_literal
  await_expression:
    expr: expression
  bang:
  bin_literal:
  binding_pattern:
    binding: value_binding_pattern
    pattern: pattern
  bitwise_operation:
    lhs: expression
    op: ["&", "<<", ">>", "^", "|"]
    rhs: expression
  block:
    statement*: [control_transfer_statement, do_statement, expression, for_statement, guard_statement, local_declaration, repeat_while_statement, statement_label, while_statement]
  boolean_literal:
  call_expression:
    function: expression
    suffix: call_suffix
  call_suffix:
    arguments?: value_arguments
    lambda*: lambda_literal
    name*: simple_identifier
  capture_list:
    item+: capture_list_item
  capture_list_item:
    name: [self_expression, simple_identifier]
    ownership?: ownership_modifier
    value?: expression
  case_pattern:
    arguments?: tuple_pattern
    name: simple_identifier
    type?: user_type
  catch_block:
    body: block
    error?: pattern
    keyword: catch_keyword
    where?: where_clause
  catch_keyword:
  check_expression:
    op: "is"
    target: expression
    type: type
  class_body:
    member*: type_level_declaration
  class_declaration:
    attribute*: attribute
    body: [class_body, enum_class_body]
    declaration_kind: ["actor", "class", "enum", "extension", "struct"]
    inherits*: inheritance_specifier
    modifiers*: [attribute, inheritance_modifier, modifiers, ownership_modifier, property_behavior_modifier]
    name: [type_identifier, unannotated_type]
    type_constraints?: type_constraints
    type_parameters?: type_parameters
  comment:
  comparison_expression:
    lhs: expression
    op: ["<", "<=", ">", ">="]
    rhs: expression
  compilation_condition:
    inner?: compilation_condition
    lhs?: compilation_condition
    name*: simple_identifier
    operand?: compilation_condition
    rhs?: compilation_condition
    value?: boolean_literal
    version*: integer_literal
  computed_getter:
    attribute*: attribute
    body?: block
    specifier: getter_specifier
  computed_modify:
    attribute*: attribute
    body?: block
    specifier: modify_specifier
  computed_property:
    accessor*: [computed_getter, computed_modify, computed_setter]
    statement*: [control_transfer_statement, do_statement, expression, for_statement, guard_statement, local_declaration, repeat_while_statement, statement_label, while_statement]
  computed_setter:
    attribute*: attribute
    body?: block
    parameter?: simple_identifier
    specifier: setter_specifier
  conjunction_expression:
    lhs: expression
    op: "&&"
    rhs: expression
  constructor_expression:
    constructed_type: [array_type, dictionary_type, user_type]
    suffix: constructor_suffix
  constructor_suffix:
    arguments?: value_arguments
    lambda*: lambda_literal
    name*: simple_identifier
  control_transfer_statement:
    kind: ["break", "continue", "return", throw_keyword, "yield"]
    result?: expression
  custom_operator:
  default_keyword:
  deinit_declaration:
    body: block
    modifiers?: modifiers
  deprecated_operator_declaration_body:
    entry*: [bin_literal, boolean_literal, hex_literal, integer_literal, line_string_literal, multi_line_string_literal, "nil", oct_literal, raw_string_literal, real_literal, regex_literal, simple_identifier]
  diagnostic:
  dictionary_literal:
    key*: expression
    value*: expression
  dictionary_type:
    key: type
    value: type
  didset_clause:
    body: block
    modifiers?: modifiers
    parameter?: simple_identifier
  directive:
    condition?: compilation_condition
  directly_assignable_expression:
    expr: expression
  disjunction_expression:
    lhs: expression
    op: "||"
    rhs: expression
  do_statement:
    body: block
    catch*: catch_block
  else:
  enum_class_body:
    member*: [enum_entry, type_level_declaration]
  enum_entry:
    data_contents*: enum_type_parameters
    modifiers?: modifiers
    name+: simple_identifier
    raw_value*: expression
  enum_type_parameter:
    default_value?: expression
    external_name?: wildcard_pattern
    name?: simple_identifier
    type: type
  enum_type_parameters:
    parameter*: enum_type_parameter
  equality_constraint:
    attribute*: attribute
    constrained_type: [identifier, nested_type_identifier]
    must_equal: type
  equality_expression:
    lhs: expression
    op: ["!=", "!==", "==", "==="]
    rhs: expression
  existential_type:
    name: unannotated_type
  external_macro_definition:
    arguments: value_arguments
  for_statement:
    body: block
    collection: expression
    item: pattern
    try?: try_operator
    type?: type_annotation
    where?: where_clause
  fully_open_range:
  function_declaration:
    async?: "async"
    body: block
    modifiers*: [attribute, inheritance_modifier, modifiers, ownership_modifier, property_behavior_modifier]
    name: [referenceable_operator, simple_identifier]
    parameter*: function_parameter
    return_type?: [implicitly_unwrapped_type, type]
    throws?: [throws, throws_clause]
    type_constraints?: type_constraints
    type_parameters?: type_parameters
  function_modifier:
  function_parameter:
    attribute?: attribute
    default_value?: expression
    parameter: parameter
  function_type:
    async?: "async"
    params: unannotated_type
    return_type: type
    throws?: [throws, throws_clause]
  getter_specifier:
    effect*: [async_keyword, throws, throws_clause]
    mutation?: mutation_modifier
  guard_statement:
    body: block
    condition+: if_condition
    else_keyword: else
  hex_literal:
  identifier:
    part+: simple_identifier
  if_condition:
    kind: [availability_condition, expression, if_let_binding]
  if_let_binding:
    pattern: pattern
    type?: type_annotation
    value?: expression
    where?: where_clause
  if_statement:
    body: block
    condition+: if_condition
    else_branch?: [block, if_statement]
    else_keyword?: else
  implicitly_unwrapped_type:
    name: type
  import_declaration:
    modifiers?: modifiers
    name: identifier
  infix_expression:
    lhs: expression
    op: custom_operator
    rhs: expression
  inheritance_constraint:
    attribute*: attribute
    constrained_type: [identifier, nested_type_identifier]
    inherits_from: [implicitly_unwrapped_type, type]
  inheritance_modifier:
  inheritance_specifier:
    inherits_from: [function_type, suppressed_constraint, user_type]
  init_declaration:
    async?: "async"
    bang?: bang
    body?: block
    modifiers?: modifiers
    name: "init"
    parameter*: function_parameter
    throws?: [throws, throws_clause]
    type_constraints?: type_constraints
    type_parameters?: type_parameters
  integer_literal:
  interpolated_expression:
    name?: value_argument_label
    reference_specifier*: value_argument_label
    type_modifiers?: type_modifiers
    value?: expression
  key_path_component:
    name?: simple_identifier
    postfix*: key_path_postfix
  key_path_expression:
    component*: key_path_component
    type?: [array_type, dictionary_type, simple_user_type]
  key_path_postfix:
    argument*: value_argument
    force_unwrap?: bang
  key_path_string_expression:
    expr: expression
  lambda_function_type:
    async?: "async"
    params?: lambda_function_type_parameters
    return_type?: [implicitly_unwrapped_type, type]
    throws?: [throws, throws_clause]
  lambda_function_type_parameters:
    parameter+: lambda_parameter
  lambda_literal:
    attribute*: attribute
    captures?: capture_list
    statement*: [control_transfer_statement, do_statement, expression, for_statement, guard_statement, local_declaration, repeat_while_statement, statement_label, while_statement]
    type?: lambda_function_type
  lambda_parameter:
    external_name?: simple_identifier
    modifiers?: parameter_modifiers
    name: [self_expression, simple_identifier]
    type?: [implicitly_unwrapped_type, type]
  line_str_text:
  line_string_literal:
    interpolation*: interpolated_expression
    text*: [line_str_text, str_escaped_char]
  macro_declaration:
    definition?: macro_definition
    modifiers?: modifiers
    name: simple_identifier
    parameter*: function_parameter
    return_type?: unannotated_type
    type_constraints?: type_constraints
    type_parameters?: type_parameters
  macro_definition:
    body: [expression, external_macro_definition]
  macro_invocation:
    name: simple_identifier
    suffix: call_suffix
    type_parameters?: type_parameters
  member_modifier:
  metatype:
    name: unannotated_type
  modifiers:
    modifier+: [attribute, function_modifier, inheritance_modifier, member_modifier, mutation_modifier, ownership_modifier, parameter_modifier, property_behavior_modifier, property_modifier, visibility_modifier]
  modify_specifier:
    mutation?: mutation_modifier
  multi_line_str_text:
  multi_line_string_literal:
    interpolation*: interpolated_expression
    text*: ["\"", multi_line_str_text, str_escaped_char]
  multiline_comment:
  multiplicative_expression:
    lhs: expression
    op: ["%", "*", "/"]
    rhs: expression
  mutation_modifier:
  navigation_expression:
    suffix: navigation_suffix
    target: [array_type, dictionary_type, expression, parenthesized_type, user_type]
  navigation_suffix:
    suffix: [integer_literal, simple_identifier]
  nested_type_identifier:
    base: unannotated_type
    member*: simple_identifier
  nil_coalescing_expression:
    if_nil: expression
    value: expression
  oct_literal:
  opaque_type:
    name: unannotated_type
  open_end_range_expression:
    start: expression
  open_start_range_expression:
    end: expression
  operator_declaration:
    body?: deprecated_operator_declaration_body
    kind: ["infix", "postfix", "prefix"]
    name: referenceable_operator
    precedence_group?: simple_identifier
  optional_chain_marker:
    expr: expression
  optional_type:
    wrapped: [array_type, dictionary_type, tuple_type, user_type]
  ownership_modifier:
  parameter:
    external_name?: simple_identifier
    modifiers?: parameter_modifiers
    name: simple_identifier
    type: [implicitly_unwrapped_type, type]
  parameter_modifier:
  parameter_modifiers:
    modifier+: parameter_modifier
  parenthesized_type:
    type: [dictionary_type, existential_type, opaque_type]
  pattern:
    binding?: value_binding_pattern
    bound_identifier?: simple_identifier
    kind: [binding_pattern, case_pattern, expression, tuple_pattern, type_casting_pattern, wildcard_pattern]
  playground_literal:
    name+: simple_identifier
    value+: expression
  postfix_expression:
    operation: ["++", "--", bang]
    target: expression
  precedence_group_attribute:
    name: simple_identifier
    value: [boolean_literal, simple_identifier]
  precedence_group_attributes:
    attribute+: precedence_group_attribute
  precedence_group_declaration:
    attributes?: precedence_group_attributes
    name: simple_identifier
  prefix_expression:
    operation: ["&", "+", "++", "-", "--", ".", bang, custom_operator, "~"]
    target: expression
  property_behavior_modifier:
  property_declaration:
    binding: value_binding_pattern
    computed_value*: computed_property
    modifiers*: [attribute, inheritance_modifier, modifiers, ownership_modifier, property_behavior_modifier]
    name+: pattern
    observers*: willset_didset_block
    type*: type_annotation
    type_constraints*: type_constraints
    value*: expression
  property_modifier:
  protocol_body:
    member*: protocol_member_declaration
  protocol_composition_type:
    type+: unannotated_type
  protocol_declaration:
    attribute*: attribute
    body: protocol_body
    declaration_kind: "protocol"
    inherits*: inheritance_specifier
    modifiers?: modifiers
    name: type_identifier
    type_constraints?: type_constraints
    type_parameters?: type_parameters
  protocol_function_declaration:
    async?: "async"
    body?: block
    modifiers?: modifiers
    name: [referenceable_operator, simple_identifier]
    parameter*: function_parameter
    return_type?: [implicitly_unwrapped_type, type]
    throws?: [throws, throws_clause]
    type_constraints?: type_constraints
    type_parameters?: type_parameters
  protocol_property_declaration:
    modifiers?: modifiers
    name: pattern
    requirements: protocol_property_requirements
    type?: type_annotation
    type_constraints?: type_constraints
  protocol_property_requirements:
    accessor*: [getter_specifier, setter_specifier]
  range_expression:
    end: expression
    op: ["...", "..<"]
    start: expression
  raw_str_continuing_indicator:
  raw_str_end_part:
  raw_str_interpolation:
    interpolation+: interpolated_expression
    start: raw_str_interpolation_start
  raw_str_interpolation_start:
  raw_str_part:
  raw_string_literal:
    continuing*: raw_str_continuing_indicator
    interpolation*: raw_str_interpolation
    text+: [raw_str_end_part, raw_str_part]
  real_literal:
  referenceable_operator:
    operator: ["!=", "!==", "%", "%=", "&", "*", "*=", "+", "++", "+=", "-", "--", "-=", "/", "/=", "<", "<<", "<=", "=", "==", "===", ">", ">=", ">>", "^", bang, custom_operator, "|", "~"]
  regex_literal:
  repeat_while_statement:
    body: block
    condition+: if_condition
  selector_expression:
    expr: expression
  self_expression:
  setter_specifier:
    mutation?: mutation_modifier
  shebang_line:
  simple_identifier:
  simple_user_type:
    arguments?: type_arguments
    name: type_identifier
  source_file:
    shebang?: shebang_line
    statement*: [do_statement, expression, for_statement, global_declaration, guard_statement, repeat_while_statement, statement_label, throw_keyword, while_statement]
  special_literal:
  statement_label:
  str_escaped_char:
  subscript_declaration:
    body: computed_property
    modifiers?: modifiers
    parameter*: function_parameter
    return_type?: [implicitly_unwrapped_type, type]
    type_constraints?: type_constraints
    type_parameters?: type_parameters
  super_expression:
  suppressed_constraint:
    suppressed: type_identifier
  switch_entry:
    default?: default_keyword
    modifiers?: modifiers
    pattern*: switch_pattern
    statement+: [control_transfer_statement, do_statement, expression, for_statement, guard_statement, local_declaration, repeat_while_statement, statement_label, while_statement]
    where?: where_clause
  switch_pattern:
    pattern: pattern
  switch_statement:
    entry*: switch_entry
    expr: expression
  ternary_expression:
    condition: expression
    if_false: expression
    if_true: expression
  throw_keyword:
  throws:
  throws_clause:
    type: unannotated_type
  try_expression:
    expr: expression
    operator: try_operator
  try_operator:
  tuple_expression:
    name*: simple_identifier
    value+: expression
  tuple_pattern:
    item+: tuple_pattern_item
  tuple_pattern_item:
    name?: simple_identifier
    pattern: pattern
  tuple_type:
    element*: tuple_type_item
  tuple_type_item:
    external_name?: wildcard_pattern
    modifiers?: parameter_modifiers
    name?: simple_identifier
    type: [dictionary_type, existential_type, opaque_type, type]
  type:
    modifiers?: type_modifiers
    name: unannotated_type
  type_annotation:
    type: [implicitly_unwrapped_type, type]
  type_arguments:
    argument+: type
  type_casting_pattern:
    pattern?: pattern
    type: type
  type_constraint:
    constraint: [equality_constraint, inheritance_constraint]
  type_constraints:
    constraint+: type_constraint
    keyword: where_keyword
  type_identifier:
  type_modifiers:
    attribute+: attribute
  type_pack_expansion:
    name: unannotated_type
  type_parameter:
    modifiers?: type_parameter_modifiers
    name: [type_identifier, type_parameter_pack]
    type?: type
  type_parameter_modifiers:
    attribute+: attribute
  type_parameter_pack:
    name: unannotated_type
  type_parameters:
    constraints?: type_constraints
    parameter+: type_parameter
  typealias_declaration:
    modifiers*: [attribute, inheritance_modifier, modifiers, ownership_modifier, property_behavior_modifier]
    name: type_identifier
    type_parameters?: type_parameters
    value: type
  user_type:
    part+: simple_user_type
  value_argument:
    name?: value_argument_label
    reference_specifier*: value_argument_label
    type_modifiers?: type_modifiers
    value?: expression
  value_argument_label:
    name: simple_identifier
  value_arguments:
    argument*: value_argument
  value_binding_pattern:
    mutability: ["let", "var"]
  value_pack_expansion:
    expr: expression
  value_parameter_pack:
    expr: expression
  visibility_modifier:
  where_clause:
    expr: expression
    keyword: where_keyword
  where_keyword:
  while_statement:
    body: block
    condition+: if_condition
  wildcard_pattern:
  willset_clause:
    body: block
    modifiers?: modifiers
    parameter?: simple_identifier
  willset_didset_block:
    didset?: didset_clause
    willset?: willset_clause

