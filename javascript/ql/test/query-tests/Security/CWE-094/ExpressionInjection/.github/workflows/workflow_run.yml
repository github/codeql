on:
  workflow_run:
    workflows: [test]

jobs:
  echo-chamber:
    runs-on: ubuntu-latest
    steps:
    - run: echo '${{ github.event.workflow_run.display_title }}' // $ TODO-SPURIOUS: Alert
    - run: echo '${{ github.event.workflow_run.head_commit.message }}' // $ TODO-SPURIOUS: Alert
    - run: echo '${{ github.event.workflow_run.head_commit.author.email }}' // $ TODO-SPURIOUS: Alert
    - run: echo '${{ github.event.workflow_run.head_commit.author.name }}' // $ TODO-SPURIOUS: Alert
