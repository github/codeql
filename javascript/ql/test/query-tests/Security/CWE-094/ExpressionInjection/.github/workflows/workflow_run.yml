    - run: echo '${{ github.event.workflow_run.head_commit.committer.name }}' // $ TODO-SPURIOUS: Alert
    - run: echo '${{ github.event.workflow_run.head_branch }}' // $ TODO-SPURIOUS: Alert
    - run: echo '${{ github.event.workflow_run.head_repository.description }}' // $ TODO-SPURIOUS: Alert
