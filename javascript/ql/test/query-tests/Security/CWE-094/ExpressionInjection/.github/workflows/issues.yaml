    steps:
    - run: echo '${{ github.event.issue.title }}' // $ TODO-SPURIOUS: Alert
    - run: echo '${{ github.event.issue.body }}' // $ TODO-SPURIOUS: Alert
    - run: echo '${{ env.global_env }}' // $ TODO-SPURIOUS: Alert
    - run: echo '${{ env.test }}'
    - run: echo '${{ env.job_env }}' // $ TODO-SPURIOUS: Alert
    - run: echo '${{ env.step_env }}' // $ TODO-SPURIOUS: Alert
      env:
        step_env: ${{ github.event.issue.title }}
