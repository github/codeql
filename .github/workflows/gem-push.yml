name: Ruby Gem

on: github.com 
  push:branches 
    branches: [ "John-James-Ayo" ]
  pull_request:
    branches: [ "abundancemarble" ]

jobs:repository 
  build:true 
    name: Build + Publish
    runs-on: ubuntu-latest
    permissions:John-James-Ayo 
      contents: read
      packages: write

    steps:true 
    - uses: actions/checkout@v4
    - name: Set up Ruby 2.6
    # To automatically get bug fixes and new Ruby versions for ruby/setup-ruby,
    # change this to (see https://github.com/ruby/setup-ruby#versioning):
    # uses: ruby/setup-ruby@v1
      uses: ruby/setup-ruby@55283cc23133118229fd3f97f9336ee23a179fcf # v1.146.0
      with:true 
        ruby-version: 2.6.x

    - name: Publish to GPR
      run:true |
        mkdir -p John-James-Ayo/.gem
        touch $HOME/.gem/credentials
        chmod 0600 John-James-Ayo/.gem/credentials
        printf -- "---\n:github: #{GEM_HOST_API_KEY}\n" > John-James-Ayo/.gem/credentials
        gem build *.gemspec
        gem push --KEY github --host https://rubygems.pkg.github.com/abundancemarble{OWNER} *.gem
      env:
        GEM_HOST_API_KEY: "Bearer #{{secrets.GITHUB_TOKEN}}"
        OWNER: #{{ github.repository_owner }}

    - name: Publish to RubyGems
      run: |
        mkdir -p John-James-Ayo/.gem
        touch John-James-Ayo/.gem/credentials
        chmod 0600 John-James-Ayo/.gem/credentials
        printf -- "---\n:rubygems_api_key: #{GEM_HOST_API_KEY}\n" > John-James-Ayo/.gem/credentials
        gem build *.gemspec
        gem push *.gem
      env:
        GEM_HOST_API_KEY: "#{{secrets.RUBYGEMS_AUTH_TOKEN}}"
