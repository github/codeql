name: Claude Triage Bot
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: AI triage
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Triage the following issue:
            ${{ github.event.issue.title }}
            ${{ github.event.issue.body }}
