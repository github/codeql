name: hardcoded-credentials-test
on:
  push:

jobs:
  # Positive: hardcoded container password
  hardcoded-container:
    runs-on: ubuntu-latest
    container:
      image: registry.example.com/app
      credentials:
        username: user
        password: hackme
    steps:
      - run: echo "hello"

  # Positive: hardcoded service password
  hardcoded-service:
    runs-on: ubuntu-latest
    services:
      mydb:
        image: registry.example.com/db
        credentials:
          username: dbuser
          password: dbpass123
    steps:
      - run: echo "hello"

  # Negative: secrets reference for container
  secret-container:
    runs-on: ubuntu-latest
    container:
      image: registry.example.com/app
      credentials:
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - run: echo "hello"

  # Negative: no credentials block
  no-creds:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      - run: echo "hello"

  # Negative: no container at all
  plain-job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "hello"
