name: secrets-inherit-test
on:
  workflow_dispatch:

jobs:
  # Positive: secrets: inherit on reusable workflow call
  inherit-all:
    uses: org/repo/.github/workflows/reusable.yml@main
    secrets: inherit

  # Negative: explicit secrets
  explicit-secrets:
    uses: org/repo/.github/workflows/reusable.yml@main
    secrets:
      API_KEY: ${{ secrets.API_KEY }}

  # Negative: no secrets key
  no-secrets:
    uses: org/repo/.github/workflows/reusable.yml@main

  # Negative: normal local job (not a reusable workflow call)
  local-job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "hello"
